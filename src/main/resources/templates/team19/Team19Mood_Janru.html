<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">
<head>
<meta charset="UTF-8">
<title>メイン画面</title>
<link rel="stylesheet" type="text/css" href="team19/Team19.css">
</head>
<body>
	<form method="post" th:action="@{team19_2}">
		<h2 class="mood-janru-text">気分を選択してください</h2>
		<div class="mood-janru-moodselect-radio">
		    <label><input type="radio" name="mood" value="楽しい" checked="checked">JOY -楽しい-</label>
		    <label><input type="radio" name="mood" value="落ち込んでいる">SAD -落ち込んでいる-</label>
		    <label><input type="radio" name="mood" value="盛り上がる">EXCITING -盛り上がる-</label>
		    <label><input type="radio" name="mood" value="リラックス">RELAX -リラックス-</label>
		</div>
		
		<h2 class="mood-janru-text">ジャンルを選択してください</h2>
		<div class="mood-janru-janruselect-radio">
			<label><input type="radio" name="janru" value="J-POP" checked="checked">J-POP -邦楽-</label>
			<label><input type="radio" name="janru" value="インスト">Instrumental -インスト-</label>
			<label><input type="radio" name="janru" value="アニソン・ボカロ">Anime・VocaloidSong -アニソン・ボーカロイド-</label>
			<label><input type="radio" name="janru" value="洋楽">Forigen Music -洋楽-</label>
			<label><input type="radio" name="janru" value="その他">Other -その他のジャンル-</label>
		</div>
		
		<div class="mood-janru-botton">
			<input type="submit" value="選択をリセット" name="reset">
			<input type="submit" value="戻る" name="back">
			<input type="submit" value="結果表示" name="forward">
		</div>
	</form>
</body>
</html>
