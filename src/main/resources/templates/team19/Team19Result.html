<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">
<head>
<meta charset="UTF-8">
<title>結果</title>
<link rel="stylesheet" type="text/css" href="Team19.css">
</head>
<body>
	<form method="post" th:action="@{team19_3}">
		
	<h2 class="result-text">あなたの気分に合う曲</h2>
	<p class="result-text2"th:text="気分： + ${mood} "></p>
	<input type="hidden" name="mood" th:value="${mood}">
	<p class="result-text2" th:text="ジャンル： + ${janru} "></p>
	<input type="hidden" name="janru" th:value="${janru}">

	<table class="list-table"border="1">
		<tr>
			<th>曲名</th>
			<th>アーティスト名</th>
			<th>再生URL</th>
			<th>イイね数</th>
		</tr>
		<tr th:each="data : ${musicList}" th:object="${data}">
			<td th:text="*{musicNm}"></td>
			<td th:text="*{artist}"></td>
			<td th:text="*{musicUrl}"></td>
			<td th:text="*{likeCnt}"></td>
		</tr>
	</table>
	
	
	<th:block th:object="${team19CommentForm}">
	    <span class="result-comment-text">コメントする曲を選択してください</span>

	    <select class="list-table"th:field="*{musicCd}">
	        <option th:each="data : ${musicList}"
	                th:value="${data.musicCd}"
	                th:text="${data.musicNm}">
	        </option>
	    </select>

	    <textarea th:field="*{comment}" rows="5" cols="30">この中に入力</textarea>
	    <p th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}"></p>
	</th:block>

	
	
	<input type="submit" value="送信" name="submit">
	
	<table class="list-table" border="1">
			<tr>
				<th>日時</th>
				<th>曲名</th>
				<th>コメント</th>
			</tr>
			<tr th:each="data,i : ${commentList}" th:object="${data}">
				<td th:text="*{commentDate}"></td>
				<td th:text="*{musicCd}"></td>
				<td th:text="*{commentText}"></td>
			</tr>
		</table>
	
	<br>
	<label class="result-botton">
	<input type="submit" value="戻る" name="back">
	<input type="submit" value="あなたも登録" name="register">
	</label>
	</form>
	<a href="team19">Topページへ戻る</a>
</body>
</html>
