<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <!-- thymeleaf.ofg を org に修正しました -->
<head>
<meta charset="UTF-8">
<title>登録画面</title>
<link rel="stylesheet" type="text/css" href="team19/Team19.css">
</head>
<body>
	<h2 class="register-tittle">おすすめの曲を登録する</h2>
	
	<form method="post" th:action="@{team19_4}" th:object="${team19RegisterForm}">
		
		<div th:if="${#fields.hasGlobalErrors()}">
			<p class="error-message" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
		</div>

		<!-- ガイドメッセージ1 -->
		<div class="step-guide">
			<span class="step-badge">STEP 1</span>
			<p class="step-text">登録したい曲の情報を入力して<strong>「リストに追加する」</strong>を押してください。</p>
		</div>

		<p class="register-text">気分を選択してください</p>
		<select class="register-moodselect" th:field="*{Mood}">
			<option value="楽しい">JOY -楽しい-</option>
			<option value="落ち込んでいる">SAD -落ち込んでいる-</option>
			<option value="盛り上がる">EXCITING -盛り上がる-</option>
			<option value="リラックス">RELAX -リラックス-</option>
		</select>
		
		<p class="register-text">ジャンルを選択してください</p>
		<select class="register-janruselect" th:field="*{Janru}">
			<option value="J-POP">J-POP -邦楽-</option>
			<option value="インスト">Instrumental -インスト-</option>
			<option value="アニソン・ボカロ">Anime・VocaloidSong -アニソン・ボーカロイド-</option>
			<option value="洋楽">Forigen Music -洋楽-</option>
			<option value="その他">Other -その他のジャンル-</option>
		</select>
		<br>
				<p class="register-text">曲名を入力してください</p>
				<input type="text" th:field="*{MusicNm}" placeholder="例: 明るい曲名">
				<span class="error-message" th:if="${#fields.hasErrors('MusicNm')}" th:errors="*{MusicNm}"></span>
				
				<br>
				<p class="register-text">アーティスト名を入力してください</p>
				<input type="text" th:field="*{Artist}" placeholder="例: アーティスト名">
				<span class="error-message" th:if="${#fields.hasErrors('Artist')}" th:errors="*{Artist}"></span>
				
				<br>
				<p class="register-text">曲のURLを入力してください <span class="url-notice">※SpotifyのURLのみ有効です</span></p>
				<input type="text" th:field="*{Url}" placeholder="https://open.spotify.com/...">
				<span class="error-message" th:if="${#fields.hasErrors('Url')}" th:errors="*{Url}"></span>		
		<!-- STEP1用のボタン（横並びに配置） -->
		<div class="register-botton">
			<input type="submit" name="add" value="リストに追加する" class="btn-add">
			<input type="submit" name="clear" value="入力をクリア" class="btn-clear">
		</div>

		<hr class="section-divider">

		<!-- ガイドメッセージ2 -->
		<div class="step-guide">
			<span class="step-badge badge-step2">STEP 2</span>
			<p class="step-text">追加した曲が下のリストに入ります。内容を確認し、問題なければ一番下の<strong>「この内容で登録を確定する」</strong>を押してください。</p>
		</div>

		<p class="rist-text">あなたが曲を登録しようとしているリスト</p>

		<div class="table-container">
		    <table class="list-table" border="1">
		        <thead>
		            <tr>
		                <th>番号</th>
		                <th>ジャンル</th>
		                <th>気分</th>
		                <th>曲名</th>
		                <th>アーティスト名</th>
		                <th>曲のURL</th>
		            </tr>
		        </thead>
		        <tbody>
		            <tr th:each="data,st : ${result}" th:object="${data}">
		                <td th:text="${st.count}"></td>
		                <td th:text="*{Janru}"></td>
		                <td th:text="*{Mood}"></td>
		                <td th:text="*{MusicNm}"></td>
		                <td th:text="*{Artist}"></td>
		                <td th:text="*{Url}"></td>
		            </tr>
		        </tbody>
		    </table>	
		</div>
		
		<!-- STEP2用の最終確定ボタン -->
		<div class="register-botton-final">
			<input type="submit" name="register" value="この内容で登録を確定する" class="btn-register">
		</div>
		
		<br>
		<div class="top-back-link">
			<a href="team19">Topページへ戻る</a>
		</div>
	</form>
</body>
</html>
